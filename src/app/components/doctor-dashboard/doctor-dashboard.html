<div class="container mt-4">
  <h2 class="mb-4">Our Doctors</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="btn btn-primary" (click)="showModal = true">
      + New Doctor
    </button>
  </div>

  <div *ngIf="loading" class="text-center my-4">
    <p>Loading Doctors...</p>
    <div class="spinner-border text-primary" role="status"></div>
  </div>
<div class="row mb-3">
  <div class="col-md-6">
    <input type="text" class="form-control" placeholder="Search by name" [(ngModel)]="searchTerm" (input)="filterDoctors()" />
  </div>
  <div class="col-md-6">
    <select class="form-select" [(ngModel)]="selectedRoleId" (change)="filterDoctors()">
      <option [ngValue]="null">All Roles</option>
      <option *ngFor="let role of roles" [ngValue]="role.roleId">{{ role.roleName }}</option>
    </select>
  </div>

</div>

  <!-- Doctor Cards -->
  <div class="row g-4" *ngIf="!loading && !error">
    <div class="col-12 col-sm-6 col-md-4" *ngFor="let doc of paginatedDoctors">
      <div class="card doctor-card h-100 shadow-sm">
        <img [src]="'https://localhost:7243/api/Doctor/' + doc.doctorId + '/profile-image'"
             class="card-img-top doctor-img"
             alt="{{ doc.name }}" />
        <div class="card-body text-center">
          <h5 class="card-title mb-1">{{ doc.name }}</h5>
          <p class="text-muted mb-2">{{ doc.specialty }}</p>
          <div class="d-flex justify-content-center gap-3">
            <a href="tel:{{ doc.phone }}" class="text-primary"><i class="bi bi-telephone-fill"></i></a>
            <a href="mailto:{{ doc.email }}" class="text-danger"><i class="bi bi-envelope-fill"></i></a>
          </div>
        </div>
        <div class="card-footer text-center">
          <a [routerLink]="['/admin/doctors', doc.doctorId]" class="btn btn-sm btn-outline-primary">
            View Details
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<nav *ngIf="totalPages > 1" class="mt-4">
  <ul class="pagination justify-content-center">
    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link" (click)="changePage(currentPage - 1)">Previous</button>
    </li>
    <li class="page-item" *ngFor="let page of [].constructor(totalPages); let i = index"
        [class.active]="currentPage === i + 1">
      <button class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</button>
    </li>
    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <button class="page-link" (click)="changePage(currentPage + 1)">Next</button>
    </li>
  </ul>
</nav>

<!-- Toast -->
<div *ngIf="showToast" class="toast align-items-center text-bg-success show position-fixed bottom-0 end-0 m-3" role="alert">
  <div class="d-flex">
    <div class="toast-body">
      {{ toastMessage }}
    </div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="showToast = false"></button>
  </div>
</div>

<!-- Doctor Onboarding Modal -->
<div class="modal fade show d-block" *ngIf="showModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Doctor Onboarding</h5>
        <button type="button" class="btn-close" (click)="showModal = false"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="form" (ngSubmit)="submit()" enctype="multipart/form-data">

          <!-- Step 1: User Registration -->
          <h6>User Registration</h6>
          <div class="mb-3">
            <label>Username</label>
            <input formControlName="username" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input formControlName="email" type="email" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input formControlName="password" type="password" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Role</label>
            <select formControlName="roleId" class="form-select">
              <option *ngFor="let role of roles" [value]="role.roleId">{{ role.roleName }}</option>
            </select>
          </div>

          <!-- Step 2: Doctor Profile -->
          <h6 class="mt-4">Doctor Profile</h6>
          <div class="mb-3">
            <label>Name</label>
            <input formControlName="name" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Specialty</label>
            <input formControlName="specialty" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Phone</label>
            <input formControlName="phone" class="form-control" />
          </div>
          <div class="mb-3">
            <label>Profile Picture</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*" class="form-control" />
          </div>

          <button class="btn btn-primary w-100" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
            {{ loading ? 'Saving...' : 'Save and Continue' }}
          </button>
        </form>

        <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
      </div>
    </div>
  </div>
</div>
