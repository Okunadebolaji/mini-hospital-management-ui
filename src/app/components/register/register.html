<div class="container mt-5">
  <h2 class="mb-4">Register</h2>

  <form [formGroup]="form" (ngSubmit)="register()" class="needs-validation" novalidate>
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input id="username" type="text" class="form-control" formControlName="username" [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched" />
      <div class="invalid-feedback">Username is required.</div>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" class="form-control" formControlName="email" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
      <div class="invalid-feedback">Enter a valid email.</div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control" formControlName="password" [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched" />
      <div class="invalid-feedback">Password is required.</div>
    </div>

    <div class="mb-3">
      <label for="roleId" class="form-label">Select a Role</label>
      <select id="roleId" class="form-select" formControlName="roleId" [class.is-invalid]="form.get('roleId')?.invalid && form.get('roleId')?.touched">
        <option [ngValue]="null" disabled>Select a role</option>
        <option *ngFor="let role of roles" [ngValue]="role.roleId">{{ role.roleName }}</option>
      </select>
      <div class="invalid-feedback">Please select a role.</div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Register</button>
  </form>

  <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
</div>
