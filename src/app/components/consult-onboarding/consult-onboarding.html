<div class="container mt-4">
  <h3 class="mb-4 text-center">Consultant Onboarding</h3>

  <form [formGroup]="form" (ngSubmit)="submit()" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input formControlName="name" id="name" class="form-control" placeholder="Enter full name" />
    </div>

    <div class="mb-3">
      <label for="specialty" class="form-label">Specialty</label>
      <input formControlName="specialty" id="specialty" class="form-control" readonly />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input formControlName="email" id="email" class="form-control" placeholder="Enter email" />
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Phone Number</label>
      <input formControlName="phoneNumber" id="phone" class="form-control" placeholder="Enter phone number" />
    </div>

    <div class="mb-3">
      <label for="profileImage" class="form-label">Profile Image</label>
      <input type="file" id="profileImage" (change)="onFileSelected($event)" class="form-control" />
      <div *ngIf="imagePreviewUrl" class="text-center mt-3">
        <img [src]="imagePreviewUrl" class="rounded-circle preview-img" alt="Preview" />
      </div>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
      {{ loading ? 'Submitting...' : 'Submit' }}
    </button>
  </form>
</div>
