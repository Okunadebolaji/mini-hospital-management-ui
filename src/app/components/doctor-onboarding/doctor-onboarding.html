<h2>Doctor Profile Setup</h2>

<!-- 🔄 Loading Spinner -->
<div *ngIf="loading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-3 text-muted">Saving your profile, please wait...</p>
</div>

<!-- ✅ Form -->
<ng-container *ngIf="!loading">
  <form [formGroup]="form" (ngSubmit)="submit()" enctype="multipart/form-data">
    <div class="mb-3">
      <label>Name</label>
      <input formControlName="name" class="form-control" />
    </div>
    <div class="mb-3">
      <label>Specialty</label>
      <input formControlName="specialty" class="form-control" />
    </div>
    <div class="mb-3">
      <label>Phone</label>
      <input formControlName="phone" class="form-control" />
    </div>
    <div class="mb-3">
      <label>Email</label>
      <input formControlName="email" type="email" class="form-control" />
    </div>

    <div class="mb-3">
      <label>Profile Picture</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*" class="form-control" />
    </div>

    <button class="btn btn-primary" type="submit">Save & Continue</button>
  </form>

  <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
</ng-container>
