<p>doctor-register works!</p>
<form [formGroup]="form" (ngSubmit)="submit()" class="container mt-5">
  <h2 class="mb-4">Register Doctor</h2>

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input type="text" class="form-control" formControlName="fullName" />
  </div>

  <div class="mb-3">
    <label class="form-label">Specialty</label>
    <input type="text" class="form-control" formControlName="specialty" />
  </div>

  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input type="text" class="form-control" formControlName="phone" />
  </div>

  <div class="mb-3">
    <label class="form-label">User ID</label>
    <input type="number" class="form-control" formControlName="userId" />
  </div>

  <button type="submit" class="btn btn-primary w-100">Register Doctor</button>

  <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
</form>
